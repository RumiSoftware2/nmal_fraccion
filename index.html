<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Tutor - Convertidor de Periódicos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
        }
        
        .form-row label {
            font-size: 14px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .resultado {
            margin-top: 30px;
            display: none;
        }
        
        .resultado.visible {
            display: block;
        }
        
        .resultado-header {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .resultado-header h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .fraccion {
            font-size: 28px;
            color: #667eea;
            font-weight: 700;
            margin: 10px 0;
        }
        
        .pasos {
            margin-top: 20px;
        }
        
        .paso {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .paso-numero {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: 700;
            margin-right: 10px;
        }
        
        .paso-titulo {
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .paso-resultado {
            background: white;
            padding: 10px;
            border-left: 3px solid #667eea;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            color: #555;
        }
        
        .error {
            background: #fee;
            border: 2px solid #f99;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .numero-visual {
            background: white;
            border: 2px solid #667eea;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .numero-visual p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .numero-visual .numero-display {
            font-size: 48px;
            color: #333;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            display: inline-block;
            position: relative;
            margin: 15px 0;
        }
        
        .numero-visual .entero-parte {
            color: #667eea;
        }
        
        .numero-visual .punto {
            margin: 0 2px;
            color: #333;
        }
        
        .numero-visual .no-periodo-parte {
            color: #333;
        }
        
        .numero-visual .periodo-parte {
            border-top: 2px solid #764ba2;
            padding-top: 8px;
            position: relative;
            display: inline-block;
            color: #764ba2;
            font-weight: 700;
        }
        
        .numero-visual .base-sub {
            font-size: 20px;
            vertical-align: sub;
            color: #666;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📐 Math Tutor</h1>
            <p>Convertidor de números periódicos a fracciones</p>
        </div>
        
        <div class="content">
            <form id="formulario">
                <p style="margin-bottom: 20px; color: #666;">
                    Ingresa un número periódico en cualquier base numérica y obtendrás la fracción equivalente.
                </p>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="entero">Entero</label>
                        <input type="text" id="entero" placeholder="0" value="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="no_periodo">No período</label>
                        <input type="text" id="no_periodo" placeholder="1" value="1">
                    </div>
                    
                    <div class="form-group">
                        <label for="periodo">Período</label>
                        <input type="text" id="periodo" placeholder="6" value="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="base">Base</label>
                        <input type="number" id="base" placeholder="7" value="7" min="2" max="36">
                    </div>
                </div>
                
                <button type="submit">Convertir a Fracción</button>
            </form>
            
            <div id="resultado" class="resultado">
                <div class="resultado-header">
                    <h2>Resultado</h2>
                    <div id="numero-visual" class="numero-visual"></div>
                    <div>
                        <p style="margin-bottom: 5px; color: #666;">Fracción en base 10:</p>
                        <div class="fraccion" id="fraccion-decimal"></div>
                        <p style="margin-bottom: 5px; margin-top: 15px; color: #666;">Fracción en base <span id="base-destino"></span>:</p>
                        <div class="fraccion" id="fraccion-base"></div>
                    </div>
                </div>
                
                <h3 style="margin-bottom: 15px;">Pasos del cálculo:</h3>
                <div id="pasos" class="pasos"></div>
            </div>
            
            <div id="error" class="error" style="display: none;"></div>
        </div>
    </div>
    
    <script>
        const formulario = document.getElementById('formulario');
        const resultadoDiv = document.getElementById('resultado');
        const errorDiv = document.getElementById('error');
        const pasosDiv = document.getElementById('pasos');
        
        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Limpiar errores anteriores
            errorDiv.style.display = 'none';
            errorDiv.innerHTML = '';
            
            // Obtener valores
            const entero = document.getElementById('entero').value || '0';
            const no_periodo = document.getElementById('no_periodo').value || '';
            const periodo = document.getElementById('periodo').value;
            const base = parseInt(document.getElementById('base').value);
            
            // Validar
            if (!periodo) {
                mostrarError('El período es obligatorio');
                return;
            }
            
            if (!base || base < 2 || base > 36) {
                mostrarError('La base debe ser un número entre 2 y 36');
                return;
            }
            
            // Mostrar loading
            resultadoDiv.classList.add('visible');
            pasosDiv.innerHTML = '<div class="loading"><span class="spinner"></span>Calculando...</div>';
            
            try {
                // Hacer request al API
                const response = await fetch('http://localhost:8000/convertir-periodico', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        entero,
                        no_periodo,
                        periodo,
                        base
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Error en la conversión');
                }
                
                const resultado = await response.json();
                
                // Mostrar resultado
                document.getElementById('fraccion-decimal').textContent = resultado.fraccion_decimal;
                document.getElementById('fraccion-base').textContent = resultado.fraccion_base_original;
                document.getElementById('base-destino').textContent = resultado.input.base;
                
                // Mostrar visualización del número periódico
                const numeroVisualizacion = crearVisualizacionNumero(
                    resultado.input.entero,
                    resultado.input.no_periodo,
                    resultado.input.periodo,
                    resultado.input.base
                );
                document.getElementById('numero-visual').innerHTML = numeroVisualizacion;
                
                // Mostrar pasos
                pasosDiv.innerHTML = resultado.pasos.map(paso => `
                    <div class="paso">
                        <div style="display: flex; align-items: center;">
                            <span class="paso-numero">${paso.paso}</span>
                            <div class="paso-titulo">${paso.descripcion}</div>
                        </div>
                        <div class="paso-resultado">${paso.resultado}</div>
                    </div>
                `).join('');
                
            } catch (error) {
                mostrarError(error.message);
                resultadoDiv.classList.remove('visible');
            }
        });
        
        function crearVisualizacionNumero(entero, no_periodo, periodo, base) {
            // Construir el HTML con la representación visual del número periódico
            let numeroHtml = `<p>Número periódico en base ${base}:</p>`;
            numeroHtml += `<div class="numero-display">`;
            
            // Parte entera
            numeroHtml += `<span class="entero-parte">${entero}</span>`;
            
            // Punto decimal (si hay partes decimales)
            if (no_periodo || periodo) {
                numeroHtml += `<span class="punto">,</span>`;
            }
            
            // Parte no periódica
            if (no_periodo) {
                numeroHtml += `<span class="no-periodo-parte">${no_periodo}</span>`;
            }
            
            // Parte periódica con línea arriba
            if (periodo) {
                numeroHtml += `<span class="periodo-parte">${periodo}</span>`;
            }
            
            // Base como subíndice
            numeroHtml += `<span class="base-sub">${base}</span>`;
            
            numeroHtml += `</div>`;
            
            return numeroHtml;
        }
        
        function mostrarError(mensaje) {
            errorDiv.innerHTML = `<strong>Error:</strong> ${mensaje}`;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
